<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manuflow — Waitlist Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#080808;color:#f2f2f2;-webkit-font-smoothing:antialiased;min-height:100vh}

nav{background:#0f0f0f;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:32px;height:32px;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:16px;font-weight:700;color:#fff}
.nav-tag{font-size:12px;font-weight:600;color:#555;background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);padding:4px 10px;border-radius:6px}
.back-link{font-size:13px;color:#555;text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.back-link:hover{color:#fff}

.page{max-width:1000px;margin:0 auto;padding:48px 40px}

/* LIVE INDICATOR */
.live-bar{display:flex;align-items:center;gap:8px;margin-bottom:32px;font-size:13px;color:#555}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-text{color:#22c55e;font-weight:600}
.last-refresh{color:#444;margin-left:4px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px}
.stat-card{background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px 28px}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:10px}
.stat-value{font-size:38px;font-weight:800;color:#fff;letter-spacing:-1px}
.stat-sub{font-size:13px;color:#444;margin-top:5px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.toolbar-title{font-size:17px;font-weight:700;color:#fff}
.toolbar-right{display:flex;gap:10px}
.search-input{background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 14px;font-size:13px;font-family:inherit;color:#fff;outline:none;width:220px;transition:border-color .2s}
.search-input:focus{border-color:rgba(255,255,255,0.3)}
.search-input::placeholder{color:#444}
.export-btn{background:#fff;color:#000;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.export-btn:hover{opacity:.85}
.clear-btn{background:transparent;color:#555;border:1px solid rgba(255,255,255,0.08);padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.clear-btn:hover{color:#ef4444;border-color:#ef4444}

/* TABLE */
.table-wrap{background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden}
.table-head{display:grid;grid-template-columns:56px 1fr 220px 110px 40px;background:#161616;border-bottom:1px solid rgba(255,255,255,0.06);padding:13px 24px}
.th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#444}
.table-body{max-height:540px;overflow-y:auto}
.table-row{display:grid;grid-template-columns:56px 1fr 220px 110px 40px;padding:15px 24px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;transition:background .15s;animation:rowIn .3s ease}
@keyframes rowIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:rgba(255,255,255,0.025)}
.td-num{font-size:13px;color:#333;font-weight:600}
.td-email{font-size:14px;color:#f0f0f0;font-weight:500}
.td-date{font-size:13px;color:#555}
.td-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#22c55e;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px}
.td-badge-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
.del-btn{background:none;border:none;cursor:pointer;color:#333;font-size:16px;padding:4px;border-radius:6px;transition:all .2s;line-height:1}
.del-btn:hover{color:#ef4444;background:rgba(239,68,68,0.1)}

/* NEW ROW FLASH */
.table-row.new{background:rgba(34,197,94,0.06)}

/* EMPTY */
.empty{padding:80px 20px;text-align:center}
.empty-icon{font-size:44px;margin-bottom:16px;opacity:.25}
.empty-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
.empty-sub{font-size:14px;color:#444;line-height:1.7}
.empty-link{display:inline-flex;align-items:center;gap:6px;margin-top:24px;background:#fff;color:#000;text-decoration:none;padding:11px 22px;border-radius:9px;font-size:14px;font-weight:700;transition:opacity .2s}
.empty-link:hover{opacity:.85}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;font-size:14px;font-weight:500;color:#fff;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.toast-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* SCROLLBAR */
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-track{background:transparent}
.table-body::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}

@media(max-width:640px){
  .page{padding:28px 20px}
  .stats-row{grid-template-columns:1fr 1fr}
  .stats-row .stat-card:last-child{grid-column:1/-1}
  nav{padding:0 20px}
  .table-head,.table-row{grid-template-columns:40px 1fr 90px}
  .th:nth-child(3),.td-date{display:none}
  .search-input{width:140px}
  .toolbar-right{gap:6px}
}
</style>
</head>
<body>

<nav>
  <a href="manuflow.html" class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <polygon points="12,2 21,7 12,12 3,7" stroke="black" stroke-width="2.2" stroke-linejoin="round" fill="none"/>
        <polyline points="3,12 12,17 21,12" stroke="black" stroke-width="2.2" stroke-linejoin="round" fill="none"/>
        <polyline points="3,17 12,22 21,17" stroke="black" stroke-width="2.2" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <span class="logo-name">Manuflow</span>
  </a>
  <span class="nav-tag">Waitlist Dashboard</span>
  <a href="manuflow.html" class="back-link">← Back to site</a>
</nav>

<div class="page">

  <div class="live-bar">
    <div class="live-dot"></div>
    <span class="live-text">Live</span>
    <span>— updates instantly when someone signs up</span>
    <span class="last-refresh" id="last-refresh"></span>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total signups</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-sub">All time</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="stat-today">0</div>
      <div class="stat-sub" id="stat-today-date">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Latest signup</div>
      <div class="stat-value" style="font-size:17px;margin-top:6px;word-break:break-all" id="stat-latest">—</div>
      <div class="stat-sub" id="stat-latest-time">No signups yet</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-title" id="toolbar-count">Waitlist — 0 people</div>
    <div class="toolbar-right">
      <input class="search-input" type="text" placeholder="Search email..." oninput="filterTable(this.value)" id="search-box">
      <button class="export-btn" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8,2 L8,10" stroke="black" stroke-width="2" stroke-linecap="round"/><path d="M4,7 L8,11 L12,7" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2,14 L14,14" stroke="black" stroke-width="2" stroke-linecap="round"/></svg>
        Export CSV
      </button>
      <button class="clear-btn" onclick="clearList()">Clear all</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <div class="th">#</div>
      <div class="th">Email</div>
      <div class="th">Signed up</div>
      <div class="th">Status</div>
      <div class="th"></div>
    </div>
    <div class="table-body" id="table-body"></div>
  </div>

</div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg">New signup!</span>
</div>

<script>
let allEntries = [];
let prevCount = 0;

function load(showToast){
  const raw = JSON.parse(localStorage.getItem('manuflow_waitlist') || '[]');
  raw.sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(showToast && raw.length > prevCount){
    const newest = raw[0];
    toast('New signup: ' + newest.email);
  }
  prevCount = raw.length;
  allEntries = raw;

  updateStats();
  const q = document.getElementById('search-box').value;
  filterTable(q);
  document.getElementById('last-refresh').textContent = '· refreshed ' + new Date().toLocaleTimeString();
}

function updateStats(){
  document.getElementById('stat-total').textContent = allEntries.length;
  document.getElementById('toolbar-count').textContent = `Waitlist — ${allEntries.length} ${allEntries.length===1?'person':'people'}`;

  const today = new Date().toDateString();
  const todayCount = allEntries.filter(e=>new Date(e.date).toDateString()===today).length;
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-today-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

  if(allEntries.length > 0){
    const latest = allEntries[0];
    const email = latest.email;
    document.getElementById('stat-latest').textContent = email;
    document.getElementById('stat-latest-time').textContent = formatDate(latest.date);
  } else {
    document.getElementById('stat-latest').textContent = '—';
    document.getElementById('stat-latest-time').textContent = 'No signups yet';
  }
}

function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function renderTable(entries){
  const body = document.getElementById('table-body');
  if(entries.length === 0 && allEntries.length === 0){
    body.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No signups yet</div>
        <div class="empty-sub">Go to the main site and submit an email.<br>It will appear here instantly.</div>
        <a href="manuflow.html" class="empty-link">Go to site →</a>
      </div>`;
    return;
  }
  if(entries.length === 0){
    body.innerHTML = `<div class="empty"><div class="empty-title" style="font-size:15px">No results for your search.</div></div>`;
    return;
  }
  body.innerHTML = entries.map((e,i)=>`
    <div class="table-row">
      <div class="td-num">${allEntries.indexOf(e)+1}</div>
      <div class="td-email">${e.email}</div>
      <div class="td-date">${formatDate(e.date)}</div>
      <div><span class="td-badge"><span class="td-badge-dot"></span>Waitlisted</span></div>
      <div><button class="del-btn" onclick="deleteEntry('${e.email}')" title="Remove">✕</button></div>
    </div>
  `).join('');
}

function filterTable(q){
  const filtered = q ? allEntries.filter(e=>e.email.toLowerCase().includes(q.toLowerCase())) : allEntries;
  renderTable(filtered);
}

function exportCSV(){
  if(allEntries.length === 0){alert('No entries to export.');return;}
  const rows = [['#','Email','Date'].join(','), ...allEntries.map((e,i)=>[i+1,`"${e.email}"`,`"${formatDate(e.date)}"`].join(','))];
  const blob = new Blob([rows.join('\n')],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'manuflow-waitlist.csv';
  a.click();
}

function deleteEntry(email){
  const list = JSON.parse(localStorage.getItem('manuflow_waitlist') || '[]');
  const updated = list.filter(e=>e.email !== email);
  localStorage.setItem('manuflow_waitlist', JSON.stringify(updated));
  load(false);
}

function clearList(){
  if(allEntries.length === 0) return;
  if(!confirm(`Delete all ${allEntries.length} waitlist entries? This cannot be undone.`)) return;
  localStorage.removeItem('manuflow_waitlist');
  allEntries = [];
  prevCount = 0;
  updateStats();
  renderTable([]);
}

function toast(msg){
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3500);
}

// Real-time: listen for localStorage changes from the main site (same origin, different tab)
window.addEventListener('storage', e=>{
  if(e.key === 'manuflow_waitlist') load(true);
});

// Also poll every 3 seconds as a fallback (same tab)
setInterval(()=>load(true), 3000);

load(false);
</script>
</body>
</html>
